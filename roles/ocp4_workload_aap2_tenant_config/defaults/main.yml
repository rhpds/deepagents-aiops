---
# ===================================================================
# Role: ocp4_workload_aap2_tenant_config
# Configures AAP2 Controller per tenant: org, user, credentials,
# inventory, project, and job templates.
# ===================================================================

# AAP2 Controller connection
# Credentials are read from the aap-admin-credentials secret in the AAP namespace
# (created by ocp4_workload_ansible_automation_platform with save_admin_credentials: true)
ocp4_workload_aap2_tenant_config_admin_credentials_secret: aap-admin-credentials
ocp4_workload_aap2_tenant_config_admin_credentials_namespace: aap
ocp4_workload_aap2_tenant_config_validate_certs: false

# Organization
ocp4_workload_aap2_tenant_config_org_name: "org-{{ guid }}"

# User
ocp4_workload_aap2_tenant_config_username: "user-{{ guid }}-agentic"
ocp4_workload_aap2_tenant_config_user_password: "{{ ocp4_workload_user_password | default(common_password) }}"
ocp4_workload_aap2_tenant_config_user_email: "{{ ocp4_workload_aap2_tenant_config_username }}@example.com"

# Machine credential (SSH to RHEL VM)
ocp4_workload_aap2_tenant_config_machine_credential_name: "{{ guid }}-rhel-ssh"
ocp4_workload_aap2_tenant_config_vm_user: "{{ rhel_vm_user | default('rhel') }}"
ocp4_workload_aap2_tenant_config_vm_password: "{{ rhel_vm_password | default(common_password) }}"
ocp4_workload_aap2_tenant_config_vm_hostname: "{{ rhel_vm_hostname | default('rhel-ssh.' ~ ocp4_workload_username ~ '-rhel.svc.cluster.local') }}"

# OpenShift credential (bearer token)
ocp4_workload_aap2_tenant_config_ocp_credential_name: "{{ guid }}-openshift"
ocp4_workload_aap2_tenant_config_ocp_host: "{{ openshift_api_url }}"
ocp4_workload_aap2_tenant_config_ocp_token: "{{ openshift_cluster_admin_token | default('') }}"

# Inventory
ocp4_workload_aap2_tenant_config_inventory_name: "{{ guid }}-inventory"

# Project
ocp4_workload_aap2_tenant_config_project_name: "{{ guid }}-plays"
ocp4_workload_aap2_tenant_config_project_scm_url: https://github.com/rhpds/agentic-aiops-plays.git
ocp4_workload_aap2_tenant_config_project_scm_branch: main

# Job templates
ocp4_workload_aap2_tenant_config_job_template_ping_name: "Ping RHEL VM"

# Retry configuration
ocp4_workload_aap2_tenant_config_retries: 30
ocp4_workload_aap2_tenant_config_retry_delay: 10
