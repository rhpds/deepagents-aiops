---
# ===================================================================
# Configure AAP2 Controller for this tenant
# Uses ansible.controller modules directly (no async complexity)
# ===================================================================

# -------------------------------------------------------------------
# 0. Read AAP admin credentials from cluster secret
# -------------------------------------------------------------------
- name: Get AAP admin credentials secret
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    name: "{{ ocp4_workload_aap2_tenant_config_admin_credentials_secret }}"
    namespace: "{{ ocp4_workload_aap2_tenant_config_admin_credentials_namespace }}"
  register: r_aap_admin_secret

- name: Assert AAP admin credentials secret exists
  ansible.builtin.assert:
    that:
      - r_aap_admin_secret.resources | length > 0
    fail_msg: >-
      AAP admin credentials secret '{{ ocp4_workload_aap2_tenant_config_admin_credentials_secret }}'
      not found in namespace '{{ ocp4_workload_aap2_tenant_config_admin_credentials_namespace }}'.
      Deploy ocp4_workload_ansible_automation_platform with
      ocp4_workload_ansible_automation_platform_save_admin_credentials: true.

- name: Extract AAP admin credentials from secret
  ansible.builtin.set_fact:
    _ocp4_workload_aap2_tenant_config_controller_host: >-
      {{ r_aap_admin_secret.resources[0].data.url | b64decode }}
    _ocp4_workload_aap2_tenant_config_controller_username: >-
      {{ r_aap_admin_secret.resources[0].data.username | b64decode }}
    _ocp4_workload_aap2_tenant_config_controller_password: >-
      {{ r_aap_admin_secret.resources[0].data.password | b64decode }}
  no_log: true

# -------------------------------------------------------------------
# 1. Organization (Gateway API)
# -------------------------------------------------------------------
- name: Create AAP2 organization via Gateway API
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}/api/gateway/v1/organizations/"
    method: POST
    user: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
    body_format: json
    body:
      name: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    status_code:
      - 201
      - 400
  register: r_org
  changed_when: r_org.status == 201
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  until: r_org is not failed

# -------------------------------------------------------------------
# 2. User (Gateway API, then org admin via Controller)
# -------------------------------------------------------------------
- name: Create AAP2 user via Gateway API
  ansible.builtin.uri:
    url: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}/api/gateway/v1/users/"
    method: POST
    user: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    force_basic_auth: true
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
    body_format: json
    body:
      username: "{{ ocp4_workload_aap2_tenant_config_username }}"
      password: "{{ ocp4_workload_aap2_tenant_config_user_password }}"
      email: "{{ ocp4_workload_aap2_tenant_config_user_email }}"
    status_code:
      - 201
      - 400
  register: r_user
  changed_when: r_user.status == 201
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  until: r_user is not failed
  no_log: true

- name: Add user as org admin
  ansible.controller.role:
    user: "{{ ocp4_workload_aap2_tenant_config_username }}"
    organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    role: admin
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  until: _r_role is not failed
  register: _r_role

# -------------------------------------------------------------------
# 3. Credentials
# -------------------------------------------------------------------
- name: Create machine credential for RHEL VM
  ansible.controller.credential:
    name: "{{ ocp4_workload_aap2_tenant_config_machine_credential_name }}"
    organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    credential_type: Machine
    inputs:
      username: "{{ ocp4_workload_aap2_tenant_config_vm_user }}"
      password: "{{ ocp4_workload_aap2_tenant_config_vm_password }}"
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  register: _r_cred_machine
  until: _r_cred_machine is not failed
  no_log: true

- name: Create OpenShift credential
  ansible.controller.credential:
    name: "{{ ocp4_workload_aap2_tenant_config_ocp_credential_name }}"
    organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    credential_type: "OpenShift or Kubernetes API Bearer Token"
    inputs:
      host: "{{ ocp4_workload_aap2_tenant_config_ocp_host }}"
      bearer_token: "{{ ocp4_workload_aap2_tenant_config_ocp_token }}"
      verify_ssl: false
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  register: _r_cred_ocp
  until: _r_cred_ocp is not failed
  no_log: true

- name: Create backdoor SSH key credential
  ansible.controller.credential:
    name: "{{ ocp4_workload_aap2_tenant_config_backdoor_credential_name }}"
    organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    credential_type: Machine
    inputs:
      username: "{{ ocp4_workload_aap2_tenant_config_backdoor_ssh_user }}"
      ssh_key_data: "{{ ocp4_workload_aap2_tenant_config_backdoor_ssh_key }}"
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  register: _r_cred_backdoor
  until: _r_cred_backdoor is not failed
  no_log: true

# -------------------------------------------------------------------
# 4. Inventory with VM host
# -------------------------------------------------------------------
- name: Create inventory
  ansible.controller.inventory:
    name: "{{ ocp4_workload_aap2_tenant_config_inventory_name }}"
    organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  register: _r_inventory
  until: _r_inventory is not failed

- name: Add RHEL VM to inventory
  ansible.controller.host:
    name: "{{ ocp4_workload_aap2_tenant_config_vm_hostname }}"
    inventory: "{{ ocp4_workload_aap2_tenant_config_inventory_name }}"
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  register: _r_host
  until: _r_host is not failed

# -------------------------------------------------------------------
# 5. Project
# -------------------------------------------------------------------
- name: Create project from plays repo
  ansible.controller.project:
    name: "{{ ocp4_workload_aap2_tenant_config_project_name }}"
    organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    scm_type: git
    scm_url: "{{ ocp4_workload_aap2_tenant_config_project_scm_url }}"
    scm_branch: "{{ ocp4_workload_aap2_tenant_config_project_scm_branch }}"
    scm_update_on_launch: true
    wait: true
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  register: _r_project
  until: _r_project is not failed

# -------------------------------------------------------------------
# 5b. Broken Execution Environment (for testing)
# -------------------------------------------------------------------
- name: Create broken execution environment
  ansible.controller.execution_environment:
    name: "{{ ocp4_workload_aap2_tenant_config_broken_ee_name }}"
    organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    image: "{{ ocp4_workload_aap2_tenant_config_broken_ee_image }}"
    pull: missing
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  register: _r_ee
  until: _r_ee is not failed

# -------------------------------------------------------------------
# 6. Job templates
# -------------------------------------------------------------------
- name: Create job templates
  ansible.controller.job_template:
    name: "{{ jt_item.name }}"
    organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
    project: "{{ ocp4_workload_aap2_tenant_config_project_name }}"
    inventory: "{{ ocp4_workload_aap2_tenant_config_inventory_name }}"
    playbook: "{{ jt_item.playbook }}"
    credentials:
      - "{{ jt_item.credential }}"
    execution_environment: "{{ jt_item.execution_environment | default(omit) }}"
    state: present
    controller_host: "{{ _ocp4_workload_aap2_tenant_config_controller_host }}"
    controller_username: "{{ _ocp4_workload_aap2_tenant_config_controller_username }}"
    controller_password: "{{ _ocp4_workload_aap2_tenant_config_controller_password }}"
    validate_certs: "{{ ocp4_workload_aap2_tenant_config_validate_certs }}"
  retries: "{{ ocp4_workload_aap2_tenant_config_retries }}"
  delay: "{{ ocp4_workload_aap2_tenant_config_retry_delay }}"
  register: _r_jt
  until: _r_jt is not failed
  loop: "{{ ocp4_workload_aap2_tenant_config_job_templates }}"
  loop_control:
    loop_var: jt_item
    label: "{{ jt_item.name }}"

# -------------------------------------------------------------------
# 7. Save user info
# -------------------------------------------------------------------
- name: Save AAP2 tenant config to agnosticd_user_info
  agnosticd.core.agnosticd_user_info:
    data:
      aap2_username: "{{ ocp4_workload_aap2_tenant_config_username }}"
      aap2_password: "{{ ocp4_workload_aap2_tenant_config_user_password }}"
      aap2_organization: "{{ ocp4_workload_aap2_tenant_config_org_name }}"
