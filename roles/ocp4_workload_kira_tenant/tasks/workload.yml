---
# ===================================================================
# Deploy Kira trouble ticketing app per tenant via Helm
# ===================================================================

# -------------------------------------------------------------------
# 0. Grant anyuid SCC to default service account
# -------------------------------------------------------------------
- name: Grant anyuid SCC for Kira pods
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: rbac.authorization.k8s.io/v1
      kind: RoleBinding
      metadata:
        name: kira-anyuid
        namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
      roleRef:
        apiGroup: rbac.authorization.k8s.io
        kind: ClusterRole
        name: system:openshift:scc:anyuid
      subjects:
        - kind: ServiceAccount
          name: default
          namespace: "{{ ocp4_workload_kira_tenant_namespace }}"

# -------------------------------------------------------------------
# 1. Clone Kira repo for Helm chart
# -------------------------------------------------------------------
- name: Clone Kira repository
  ansible.builtin.git:
    repo: "{{ ocp4_workload_kira_tenant_helm_repo }}"
    dest: /tmp/kira-helm
    version: "{{ ocp4_workload_kira_tenant_helm_repo_ref }}"
    force: true

# -------------------------------------------------------------------
# 2. Patch Helm chart for OpenShift compatibility
# -------------------------------------------------------------------
- name: Remove Helm namespace template to avoid conflict with existing namespace
  ansible.builtin.file:
    path: "/tmp/kira-helm/{{ ocp4_workload_kira_tenant_helm_chart_path }}/templates/namespace.yaml"
    state: absent

- name: Patch postgres template to set PGDATA subdirectory
  ansible.builtin.lineinfile:
    path: "/tmp/kira-helm/{{ ocp4_workload_kira_tenant_helm_chart_path }}/templates/postgres.yaml"
    insertafter: "key: POSTGRES_PASSWORD"
    line: "            - name: PGDATA\n              value: /var/lib/postgresql/data/pgdata"

# -------------------------------------------------------------------
# 3. Generate Helm values
# -------------------------------------------------------------------
- name: Template Helm values file
  ansible.builtin.template:
    src: helm-values.yaml.j2
    dest: /tmp/kira-helm-values.yaml
    mode: "0644"

# -------------------------------------------------------------------
# 3. Deploy via Helm
# -------------------------------------------------------------------
- name: Deploy Kira via Helm
  kubernetes.core.helm:
    name: "{{ ocp4_workload_kira_tenant_release_name }}"
    chart_ref: "/tmp/kira-helm/{{ ocp4_workload_kira_tenant_helm_chart_path }}"
    release_namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    values_files:
      - /tmp/kira-helm-values.yaml
    state: present
    wait: false

# -------------------------------------------------------------------
# 4. Add LLM environment variables to API configmap
# -------------------------------------------------------------------
- name: Patch Kira API configmap with LLM settings
  when: ocp4_workload_kira_tenant_llm_base_url | default('') | length > 0
  kubernetes.core.k8s:
    state: patched
    api_version: v1
    kind: ConfigMap
    name: "{{ ocp4_workload_kira_tenant_release_name }}-config"
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    definition:
      data:
        KIRA_LLM_BASE_URL: "{{ ocp4_workload_kira_tenant_llm_base_url }}"
        KIRA_LLM_MODEL: "{{ ocp4_workload_kira_tenant_llm_model }}"

- name: Patch Kira API secret with LLM API key
  when: ocp4_workload_kira_tenant_llm_api_key | default('') | length > 0
  kubernetes.core.k8s:
    state: patched
    api_version: v1
    kind: Secret
    name: "{{ ocp4_workload_kira_tenant_release_name }}-secrets"
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    definition:
      stringData:
        KIRA_LLM_API_KEY: "{{ ocp4_workload_kira_tenant_llm_api_key }}"
  no_log: true

# -------------------------------------------------------------------
# 5. Wait for API to be ready
# (LLM config was patched into configmap/secret before pods start)
# -------------------------------------------------------------------
- name: Wait for Kira API deployment to be available
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: Deployment
    name: "{{ ocp4_workload_kira_tenant_release_name }}-api"
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
  register: r_kira_api
  retries: "{{ ocp4_workload_kira_tenant_deploy_retries }}"
  delay: "{{ ocp4_workload_kira_tenant_deploy_retry_delay }}"
  until:
    - r_kira_api.resources | length > 0
    - r_kira_api.resources[0].status.readyReplicas is defined
    - r_kira_api.resources[0].status.readyReplicas >= 1

# -------------------------------------------------------------------
# 7. Run database migration
# -------------------------------------------------------------------
- name: Get Kira API pod name
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Pod
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=api"
      - "app.kubernetes.io/instance=kira"
    field_selectors:
      - "status.phase=Running"
  register: r_kira_api_pod

- name: Fix alembic.ini to use correct database URL
  when: r_kira_api_pod.resources | length > 0
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    pod: "{{ r_kira_api_pod.resources[0].metadata.name }}"
    command: >-
      sed -i 's|sqlalchemy.url = .*|sqlalchemy.url = postgresql://kira:{{ ocp4_workload_kira_tenant_postgres_password }}@postgres:5432/kira|' /app/alembic.ini

- name: Run Kira database migration
  when: r_kira_api_pod.resources | length > 0
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    pod: "{{ r_kira_api_pod.resources[0].metadata.name }}"
    command: uv run alembic upgrade head
  register: r_migration
  retries: "{{ ocp4_workload_kira_tenant_migration_retries }}"
  delay: "{{ ocp4_workload_kira_tenant_migration_retry_delay }}"
  until: r_migration is succeeded
  ignore_errors: true

- name: Seed Kira database with default users
  when: r_kira_api_pod.resources | length > 0
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    pod: "{{ r_kira_api_pod.resources[0].metadata.name }}"
    command: uv run python -m api.seed
  register: r_seed
  retries: "{{ ocp4_workload_kira_tenant_migration_retries }}"
  delay: "{{ ocp4_workload_kira_tenant_migration_retry_delay }}"
  until: r_seed is succeeded
  ignore_errors: true

# -------------------------------------------------------------------
# 8. Create per-tenant Kira user directly in the database
# -------------------------------------------------------------------
- name: Create per-tenant Kira user
  when: r_kira_api_pod.resources | length > 0
  kubernetes.core.k8s_exec:
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    pod: "{{ r_kira_api_pod.resources[0].metadata.name }}"
    command: >-
      uv run python -c "from api.db.session import SessionLocal; from api.db.models import User; from api.auth.passwords import hash_password; db = SessionLocal(); u = db.query(User).filter(User.username == '{{ ocp4_workload_kira_tenant_user_username }}').first(); exec('raise SystemExit(0)') if u else None; db.add(User(username='{{ ocp4_workload_kira_tenant_user_username }}', password_hash=hash_password('{{ ocp4_workload_kira_tenant_user_password }}'), display_name='{{ ocp4_workload_kira_tenant_user_display_name }}', role='{{ ocp4_workload_kira_tenant_user_role }}')); db.commit(); print('User created: {{ ocp4_workload_kira_tenant_user_username }}')"
  register: r_kira_user
  retries: "{{ ocp4_workload_kira_tenant_migration_retries }}"
  delay: "{{ ocp4_workload_kira_tenant_migration_retry_delay }}"
  until: r_kira_user is succeeded
  ignore_errors: true

# -------------------------------------------------------------------
# 9. Get Kira route URL
# -------------------------------------------------------------------
- name: Get Kira frontend route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=frontend"
  register: r_kira_route

- name: Set Kira URL fact
  when: r_kira_route.resources | length > 0
  ansible.builtin.set_fact:
    _ocp4_workload_kira_tenant_url: "https://{{ r_kira_route.resources[0].spec.host }}"

# -------------------------------------------------------------------
# 10. Save user info
# -------------------------------------------------------------------
- name: Get Kira frontend route
  kubernetes.core.k8s_info:
    api_version: route.openshift.io/v1
    kind: Route
    namespace: "{{ ocp4_workload_kira_tenant_namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=frontend"
  register: r_kira_route

- name: Set Kira URL fact
  when: r_kira_route.resources | length > 0
  ansible.builtin.set_fact:
    _ocp4_workload_kira_tenant_url: "https://{{ r_kira_route.resources[0].spec.host }}"

# -------------------------------------------------------------------
# 9. Save user info
# -------------------------------------------------------------------
- name: Save Kira connection info to agnosticd_user_info
  agnosticd.core.agnosticd_user_info:
    data:
      kira_url: "{{ _ocp4_workload_kira_tenant_url | default('') }}"
      kira_api_key: "{{ ocp4_workload_kira_tenant_api_key }}"
      kira_admin_username: "{{ ocp4_workload_kira_tenant_admin_username }}"
      kira_admin_password: "{{ ocp4_workload_kira_tenant_admin_password }}"
      kira_user_name: "{{ ocp4_workload_kira_tenant_user_username }}"
      kira_user_password: "{{ ocp4_workload_kira_tenant_user_password }}"

# -------------------------------------------------------------------
# 10. Cleanup temp files
# -------------------------------------------------------------------
- name: Clean up Kira temp files
  ansible.builtin.file:
    path: "{{ cleanup_item }}"
    state: absent
  loop:
    - /tmp/kira-helm
    - /tmp/kira-helm-values.yaml
  loop_control:
    loop_var: cleanup_item
