---
# ===================================================================
# Role: ocp4_workload_kira_tenant
# Deploys Kira trouble ticketing app per tenant via Helm.
# ===================================================================

# Kira Helm chart source
ocp4_workload_kira_tenant_helm_repo: https://github.com/tonykay/kira.git
ocp4_workload_kira_tenant_helm_repo_ref: main
ocp4_workload_kira_tenant_helm_chart_path: deploy/helm/kira

# Target namespace (defaults to existing tenant namespace)
ocp4_workload_kira_tenant_namespace: "{{ ocp4_workload_username }}-agentic"

# Container images
ocp4_workload_kira_tenant_api_image: quay.io/rhpds/kira-api
ocp4_workload_kira_tenant_api_tag: "0.2.0"
ocp4_workload_kira_tenant_frontend_image: quay.io/rhpds/kira-frontend
ocp4_workload_kira_tenant_frontend_tag: "0.2.0"

# PostgreSQL
ocp4_workload_kira_tenant_postgres_image: postgres
ocp4_workload_kira_tenant_postgres_tag: "16"
ocp4_workload_kira_tenant_postgres_password: "{{ common_password | default('kira') }}"
ocp4_workload_kira_tenant_postgres_storage: 1Gi

# Kira application config
ocp4_workload_kira_tenant_api_key: "{{ common_password | default('dev-api-key') }}"
ocp4_workload_kira_tenant_secret_key: "{{ common_password | default('dev-secret-key') }}"
ocp4_workload_kira_tenant_artifact_storage: 1Gi
# Kira login credentials (from seed data)
ocp4_workload_kira_tenant_login_username: admin
ocp4_workload_kira_tenant_login_password: admin123

ocp4_workload_kira_tenant_allow_iframe: true
ocp4_workload_kira_tenant_cors_origins: "*"

# LLM integration (wired to tenant's LiteLLM)
ocp4_workload_kira_tenant_llm_base_url: "{{ litellm_api_endpoint | default('') }}"
ocp4_workload_kira_tenant_llm_api_key: "{{ litellm_virtual_key | default('') }}"
ocp4_workload_kira_tenant_llm_model: "{{ agentic_llm_model | default('llama-scout-17b') }}"

# Route hostname (empty = auto-generated)
ocp4_workload_kira_tenant_route_host: ""

# Helm release name
ocp4_workload_kira_tenant_release_name: kira

# Retry configuration
ocp4_workload_kira_tenant_deploy_retries: 60
ocp4_workload_kira_tenant_deploy_retry_delay: 10
ocp4_workload_kira_tenant_migration_retries: 5
ocp4_workload_kira_tenant_migration_retry_delay: 10
